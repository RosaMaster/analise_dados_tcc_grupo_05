name: Validador de Branch para permissão de Pull Request!
on:
  pull_request:
    branches: [main]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch
        if: github.head_ref != 'develop'
        run: |
          echo "ERROR: Pull Requests para a MAIN devem vir obrigatoriamente da DEVELOP."
          exit 1
